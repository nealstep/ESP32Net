; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = secret.ini
default_envs = m5stack-atoms3-lite

[base]
extra_scripts = 
    pre:inject_version.py
build_flags =
    -DUDP_DATA_PORT='${secret.udp_data_port}'
    -DLOCAL_QUEUE_SIZE=${secret.local_queue_size}
    -DINTERNET_QUEUE_SIZE=${secret.internet_queue_size}
    -DUSE_QUEUE=${secret.use_queue}
    -DUSE_AES=${secret.use_aes}    
lib_deps =
    Logger=https://github.com/nealstep/ESP32-Logger

[ota]
platform = espressif32
framework = arduino
upload_protocol = espota
upload_flags = 
    --auth="${secret.upload_password}"
    --host_port=22564

[s3core]
platform = espressif32
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
extra_scripts = 
    ${base.extra_scripts}
build_flags =
    ${base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DSERIAL_SPEED=${monitor_speed}
    -DWIFI_SSID='${secret.wifi_ssid}'
    -DWIFI_PASSWORD='${secret.wifi_password}'
    -DOTA_PASSWORD='${secret.upload_password}'
    -DTZ_FULL='${secret.tz_full}'
    -DHEX_KEY='${secret.aes_key}'
    -DLOCAL_QUEUE_SIZE='${secret.local_queue_size}'
    -DINTERNET_QUEUE_SIZE='${secret.internet_queue_size}'

    ; -DCORE_DEBUG_LEVEL=0
    ; -DDB_LVL=0xFF
    ; -DLOG_SERIAL=Serial
; monitor_filters = esp32_exception_decoder
; build_type = debug
lib_deps = 
    ${base.lib_deps}
    TaskScheduler=https://github.com/arkhipenko/TaskScheduler
    ArduinoJson=https://github.com/bblanchon/ArduinoJson
test_ignore = test_native

[m5stack]
extends = s3core
build_flags =
    ${s3core.build_flags}
    -DESP32S3=1
    -DIS_M5=1
lib_deps =
    ${s3core.lib_deps}
    M5Unified=https://github.com/m5stack/M5Unified
    
[env:m5stack-atoms3-lite]
extends = m5stack
board = m5stack-atoms3
build_flags =
    ${m5stack.build_flags}
    -DHAVE_RTC=0
    -DBUILD="m5stack-atoms3-lite"
    -DDB_LVL=0xFF
    -DLOG_SERIAL=Serial
;     -DCORE_DEBUG_LEVEL=5
; monitor_filters = esp32_exception_decoder
; build_type = debug

[env:m5stack-atoms3-lite_1_ota]
extends = env:m5stack-atoms3-lite, ota
build_flags =
    ${m5stack.build_flags}
    -DHAVE_RTC=0
    -DBUILD="m5stack-atoms3-lite_1_ota"
    -DDB_LVL=0x00
    -DM_V=0x0001
    -DM_S_DUMMY_ID=1
upload_port = '${ips.m5stack_atoms3_lite_1}'

[env:native]
platform = native
test_ignore = test_embedded
extra_scripts = 
    ${base.extra_scripts}
test_build_src = true
build_flags =
    ${base.build_flags}
    -g
    -DLOG_STDERR=1
    -DDB_LVL=0xFF
    -DUSE_QUEUE=1
lib_deps =
    ${base.lib_deps}
lib_compat_mode = off
